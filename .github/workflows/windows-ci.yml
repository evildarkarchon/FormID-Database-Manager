name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore "FormID Database Manager.slnx"

      - name: Build WinUI project
        run: dotnet build "FormID Database Manager.WinUI\FormID Database Manager.WinUI.csproj" --configuration Release -p:Platform=x64 --no-restore

      - name: Build solution
        run: dotnet build "FormID Database Manager.slnx" --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test "FormID Database Manager.Tests" --configuration Release
          --filter "Category!=ManualPerformance&Category!=PerformanceRegression&Category!=LoadTest&Category!=StressTest"
          --logger "trx;LogFileName=test-results.trx"

      - name: Publish portable
        shell: pwsh
        run: ./scripts/publish-portable.ps1 -Configuration Release

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: publish/FormID-Database-Manager-portable-win-x64.zip
